blueprint:
  name: Sensor Open - Discord Notify
  description: >
    Sends a Discord message whenever a binary sensor (door, window, contact,
    motion, etc.) opens or turns on. Can target a channel OR send a DM to a
    specific user. Supports an optional cooldown to avoid message spam.
  domain: automation
  input:
    sensor_entity:
      name: Sensor
      description: The binary sensor to watch (door, window, contact, motion, etc.).
      selector:
        entity:
          domain: binary_sensor

    open_state:
      name: Trigger State
      description: Which state counts as "open" / active for your sensor.
      default: "on"
      selector:
        select:
          options:
            - "on"
            - "off"

    discord_notify_service:
      name: Discord Notify Service
      description: >
        The notify service for your Discord bot.
        Example: notify.discord
      selector:
        text:

    discord_target:
      name: Discord Target (Channel ID or User ID)
      description: >
        Where to send the message. This is a numeric ID — right-click a
        channel or user in Discord (with Developer Mode on) and choose
        "Copy ID".

        • For a channel message: paste the channel ID (e.g. 123456789012345678)
        • For a DM to someone: paste their user ID (e.g. 987654321098765432)

        The bot must share a server with the user to DM them.
      selector:
        text:

    discord_message:
      name: Message
      description: >
        The message body. Use {{ sensor_name }} as a placeholder for the
        sensor's friendly name, and {{ now().strftime('%H:%M') }} for time.
      default: "⚠️ {{ sensor_name }} is open - please close it!"
      selector:
        text:
          multiline: true

    cooldown_minutes:
      name: Cooldown (minutes)
      description: >
        Minimum minutes between repeated Discord messages for the same sensor.
        Set to 0 to disable the cooldown.
      default: 10
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: min

# ── Internal variables ────────────────────────────────────────────────────────
variables:
  sensor_entity: !input sensor_entity
  discord_message_template: !input discord_message
  cooldown_minutes: !input cooldown_minutes

# ── Trigger ───────────────────────────────────────────────────────────────────
trigger:
  - platform: state
    entity_id: !input sensor_entity
    to: !input open_state

# ── Cooldown condition ────────────────────────────────────────────────────────
condition:
  - condition: template
    value_template: >
      {% set cooldown = cooldown_minutes | int(0) %}
      {% if cooldown == 0 %}
        true
      {% else %}
        {% set last = state_attr(this.entity_id, 'last_triggered') %}
        {% if last is none %}
          true
        {% else %}
          {{ (now() - last).total_seconds() > (cooldown * 60) }}
        {% endif %}
      {% endif %}

# ── Actions ───────────────────────────────────────────────────────────────────
action:
  - variables:
      sensor_name: >-
        {{ state_attr(sensor_entity, 'friendly_name') | default(sensor_entity) }}
      final_message: >-
        {{ discord_message_template
           | replace('{{ sensor_name }}', sensor_name) }}

  - service: !input discord_notify_service
    data:
      message: "{{ final_message }}"
      target: !input discord_target

mode: single
max_exceeded: silent